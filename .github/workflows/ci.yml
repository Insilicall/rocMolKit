name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cpu-smoke:
    # CI público sem GPU AMD: roda hipify + cmake configure (compile pode falhar sem GPU).
    # Validação real fica no runner self-hosted (job rocm-runner abaixo).
    runs-on: ubuntu-22.04
    container:
      image: rocm/dev-ubuntu-22.04:7.2.3
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (apt)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build python3-dev python3-pip curl git \
            libboost-all-dev libeigen3-dev zlib1g-dev libbz2-dev \
            libfreetype6-dev \
            hipblas-dev hiprand-dev rocblas-dev rocrand-dev \
            hipcub-dev rocprim-dev rocthrust-dev || true

      - name: Install Python build tools via uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          ~/.local/bin/uv pip install --system --break-system-packages \
            scikit-build-core nanobind numpy

      - name: Cache RDKit build
        id: cache-rdkit
        uses: actions/cache@v4
        with:
          path: /opt/rdkit
          # Bump key when bumping RDKIT version in tools/build_rdkit.sh
          key: rdkit-Release_2024_09_6-${{ runner.os }}-rocm7.2
          # Save the cache even if the job ends in failure - lets the next
          # run skip the 10-minute RDKit rebuild while we iterate on rocmolkit_core.
          save-always: true

      - name: Build RDKit from source (cache miss only)
        if: steps.cache-rdkit.outputs.cache-hit != 'true'
        run: ./tools/build_rdkit.sh Release_2024_09_6
        env:
          JOBS: 4

      - name: Wire RDKit
        run: |
          echo "RDKIT_ROOT=/opt/rdkit" >> $GITHUB_ENV
          echo "/opt/rdkit/lib" > /etc/ld.so.conf.d/rdkit.conf && ldconfig

      - name: CMake configure
        env:
          CMAKE_PREFIX_PATH: /opt/rdkit
        run: |
          # CMake >= 3.22 wants Clang directly for HIP language; hipcc
          # wrapper is rejected. ROCm 6.2 ships clang at this path.
          ROCM_PATH=$(ls -d /opt/rocm-* 2>/dev/null | head -1)
          ROCM_PATH=${ROCM_PATH:-/opt/rocm}
          ROCM_CLANG="$ROCM_PATH/llvm/bin/clang++"
          DEVICE_LIB=$(find "$ROCM_PATH/lib/llvm/lib/clang/"*/lib/amdgcn/bitcode -maxdepth 0 -type d 2>/dev/null | head -1)
          DEVICE_LIB=${DEVICE_LIB:-$ROCM_PATH/amdgcn/bitcode}
          HIP_FLAGS="--rocm-path=$ROCM_PATH --rocm-device-lib-path=$DEVICE_LIB"
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$ROCM_CLANG" \
            -DCMAKE_HIP_COMPILER="$ROCM_CLANG" \
            -DCMAKE_HIP_PLATFORM=amd \
            -DCMAKE_HIP_FLAGS="$HIP_FLAGS" \
            -DCMAKE_HIP_FLAGS_INIT="$HIP_FLAGS" \
            -DROCM_PATH="$ROCM_PATH" \
            -DGPU_TARGETS="gfx1200;gfx1100" \
            -DRDKit_ROOT=/opt/rdkit \
            -DROCMOLKIT_BUILD_TESTS=OFF

      - name: CMake build rocmolkit_core
        # No more `|| true` - we want real failures to surface. The Docker
        # builder uses the same toolchain so any compile error here will also
        # block the slim image.
        run: cmake --build build --target rocmolkit_core

  python-bindings-probe:
    # Phase 2 - builds boost-python bindings on top of rocmolkit_core.
    # _embedMolecules links cleanly. Now part of the gating set.
    needs: build-cpu-smoke
    runs-on: ubuntu-22.04
    container:
      image: rocm/dev-ubuntu-22.04:6.2
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build python3-dev python3-pip curl git \
            libboost-all-dev libeigen3-dev zlib1g-dev libbz2-dev libfreetype6-dev \
            hipblas-dev hiprand-dev rocblas-dev rocrand-dev \
            hipcub-dev rocprim-dev rocthrust-dev || true

      - name: uv + RDKit cache
        uses: actions/cache@v4
        with:
          path: /opt/rdkit
          key: rdkit-Release_2024_09_6-${{ runner.os }}-rocm6.2

      - name: Build Python bindings
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          ~/.local/bin/uv pip install --system --break-system-packages \
            scikit-build-core nanobind numpy
          ROCM_CLANG=$(ls /opt/rocm-*/llvm/bin/clang++ 2>/dev/null | head -1)
          ROCM_PATH=$(ls -d /opt/rocm-* 2>/dev/null | head -1)
          ROCM_CLANG="$ROCM_PATH/llvm/bin/clang++"
          DEVICE_LIB=$(find "$ROCM_PATH/lib/llvm/lib/clang/"*/lib/amdgcn/bitcode -maxdepth 0 -type d 2>/dev/null | head -1)
          DEVICE_LIB=${DEVICE_LIB:-$ROCM_PATH/amdgcn/bitcode}
          HIP_FLAGS="--rocm-path=$ROCM_PATH --rocm-device-lib-path=$DEVICE_LIB"
          cmake -S . -B build-bindings -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$ROCM_CLANG" \
            -DCMAKE_HIP_COMPILER="$ROCM_CLANG" \
            -DCMAKE_HIP_PLATFORM=amd \
            -DCMAKE_HIP_FLAGS="$HIP_FLAGS" \
            -DCMAKE_HIP_FLAGS_INIT="$HIP_FLAGS" \
            -DROCM_PATH="$ROCM_PATH" \
            -DGPU_TARGETS="gfx1200;gfx1100" \
            -DRDKit_ROOT=/opt/rdkit \
            -DROCMOLKIT_BUILD_PYTHON_BINDINGS=ON
          # Build whatever bindings are currently active in nvmolkit/CMakeLists.txt
          cmake --build build-bindings

  docker-devel-smoke:
    # Build do Dockerfile.devel + smoke import (sem GPU, só valida que tudo se
    # carrega como módulo Python).
    runs-on: ubuntu-22.04
    needs: build-cpu-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build devel
        run: docker build -f docker/Dockerfile.devel -t rocmolkit:devel .

      - name: Smoke import + pytest (no GPU)
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace rocmolkit:devel bash -c '
            python3 -c "import rocmolkit; print(\"version:\", rocmolkit.__version__)"
            python3 -m pip install pytest --quiet
            python3 -m pytest tests/ -v -m "not gpu"
          '

  docker-slim-size:
    # Verifica que a imagem slim fica abaixo do orçamento.
    runs-on: ubuntu-22.04
    needs: build-cpu-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build slim
        run: |
          docker build -f docker/Dockerfile.slim -t rocmolkit:slim \
            --build-arg GPU_TARGETS="gfx1200;gfx1100" .

      - name: Check size budget (< 2.5 GB)
        run: |
          size=$(docker image inspect rocmolkit:slim --format='{{.Size}}')
          mb=$((size / 1024 / 1024))
          echo "rocmolkit:slim = ${mb} MB"
          # Realistic budget after Phase 1 trims (rocsolver/rocsparse out,
          # Tensile filter, no docs/llvm). Currently sitting at ~2.0 GB.
          # Headroom of ~500 MB for new Phase 2+ deps.
          if [ "$mb" -gt 2560 ]; then
            echo "FAIL: imagem acima do orçamento (2560 MB)"
            exit 1
          fi

  rocm-runner:
    # Job real com GPU AMD — exige runner self-hosted.
    if: false  # ativar quando o runner estiver online
    runs-on: [self-hosted, rocm]
    steps:
      - uses: actions/checkout@v4
      - name: Build + test
        run: |
          docker build -f docker/Dockerfile.devel -t rocmolkit:devel .
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video \
            -v ${{ github.workspace }}:/workspace \
            rocmolkit:devel \
            bash -c "cmake -S /workspace -B /workspace/build -GNinja -DROCMOLKIT_BUILD_TESTS=ON && \
                     cmake --build /workspace/build && \
                     ctest --test-dir /workspace/build --output-on-failure"

      - name: Numerical parity gate
        run: |
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri --group-add video \
            -v ${{ github.workspace }}:/workspace \
            rocmolkit:devel \
            python3 /workspace/tools/numerical_diff.py etkdg /workspace/tests/data/spice_100.smi
