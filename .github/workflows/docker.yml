name: docker-publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.slim
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rocmolkit:slim
            ghcr.io/${{ github.repository_owner }}/rocmolkit:${{ github.ref_name }}-slim
          build-args: |
            GPU_TARGETS=gfx1100;gfx90a;gfx942
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push devel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.devel
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rocmolkit:devel
            ghcr.io/${{ github.repository_owner }}/rocmolkit:${{ github.ref_name }}-devel
          cache-from: type=gha
          cache-to: type=gha,mode=max
